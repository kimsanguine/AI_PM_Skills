<?xml version="1.0" encoding="UTF-8"?>
<svg width="1080" height="220" viewBox="0 0 1080 220" xmlns="http://www.w3.org/2000/svg">
  <rect width="1080" height="220" fill="#ffffff"/>
  <text x="540" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6B7280" text-anchor="middle" font-weight="500">
    Agent Product Lifecycle — 43 skills across 6 plugins
  </text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#9CA3AF"/>
    </marker>
  </defs>
  <!-- hplan (Gate) — Stage 0 -->
  <rect x="20" y="55" width="140" height="100" rx="10" fill="#F87171" stroke="#DC2626" stroke-width="2"/>
  <text x="90" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">hplan ⭐</text>
  <text x="90" y="98" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Gate</text>
  <text x="90" y="118" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#FEE2E2" text-anchor="middle" font-weight="500">7 skills</text>
  <text x="90" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#FEE2E2" text-anchor="middle">Should we build?</text>
  <!-- oracle -->
  <rect x="190" y="55" width="140" height="100" rx="10" fill="#6366F1"/>
  <text x="260" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">discover</text>
  <text x="260" y="98" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Discovery</text>
  <text x="260" y="118" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#E0E7FF" text-anchor="middle" font-weight="500">6 skills</text>
  <text x="260" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#E0E7FF" text-anchor="middle">What to build?</text>
  <!-- atlas -->
  <rect x="360" y="55" width="140" height="100" rx="10" fill="#8B5CF6"/>
  <text x="430" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">architect</text>
  <text x="430" y="98" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Architecture</text>
  <text x="430" y="118" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#EDE9FE" text-anchor="middle" font-weight="500">7 skills</text>
  <text x="430" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#EDE9FE" text-anchor="middle">How to structure?</text>
  <!-- forge -->
  <rect x="530" y="55" width="140" height="100" rx="10" fill="#F59E0B"/>
  <text x="600" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">deliver</text>
  <text x="600" y="98" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Delivery</text>
  <text x="600" y="118" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#FEF3C7" text-anchor="middle" font-weight="500">12 skills</text>
  <text x="600" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#FEF3C7" text-anchor="middle">How to ship?</text>
  <!-- argus -->
  <rect x="700" y="55" width="140" height="100" rx="10" fill="#10B981"/>
  <text x="770" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">measure</text>
  <text x="770" y="98" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Measurement</text>
  <text x="770" y="118" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#D1FAE5" text-anchor="middle" font-weight="500">8 skills</text>
  <text x="770" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#D1FAE5" text-anchor="middle">How to measure?</text>
  <!-- muse -->
  <rect x="870" y="55" width="140" height="100" rx="10" fill="#EC4899"/>
  <text x="940" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">learn</text>
  <text x="940" y="98" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Learning</text>
  <text x="940" y="118" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#FBCFE8" text-anchor="middle" font-weight="500">3 skills</text>
  <text x="940" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#FBCFE8" text-anchor="middle">How to learn?</text>
  <!-- Arrows -->
  <line x1="160" y1="105" x2="185" y2="105" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="330" y1="105" x2="355" y2="105" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="500" y1="105" x2="525" y2="105" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="670" y1="105" x2="695" y2="105" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="840" y1="105" x2="865" y2="105" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrowhead)"/>
  <!-- Feedback loop muse → hplan -->
  <path d="M 940 155 Q 940 200, 540 200 Q 90 200, 90 155" stroke="#9CA3AF" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>
  <text x="540" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle" font-style="italic">Accumulated TK feeds back into next gate</text>
</svg>
