<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="200" fill="#ffffff"/>
  
  <!-- Subtitle -->
  <text x="450" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B7280" text-anchor="middle" font-weight="400">
    Agent Product Lifecycle — 32 skills across 5 plugins
  </text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#9CA3AF"/>
    </marker>
    <marker id="arrowhead-dashed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#D1D5DB"/>
    </marker>
  </defs>
  
  <!-- Main flow arrows -->
  <!-- Oracle to Atlas -->
  <line x1="155" y1="90" x2="215" y2="90" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Atlas to Forge -->
  <line x1="325" y1="90" x2="385" y2="90" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Forge to Argus -->
  <line x1="495" y1="90" x2="555" y2="90" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Argus to Muse -->
  <line x1="665" y1="90" x2="725" y2="90" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Feedback loop - curved dashed line from Muse back to Oracle -->
  <path d="M 745 110 Q 450 160 95 110" stroke="#D1D5DB" stroke-width="2" fill="none" stroke-dasharray="4,4" marker-end="url(#arrowhead-dashed)"/>
  
  <!-- Plugin boxes -->
  
  <!-- Oracle (Discovery) -->
  <rect x="25" y="55" width="130" height="70" rx="8" fill="#6366F1"/>
  <text x="90" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">oracle</text>
  <text x="90" y="98" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Discovery</text>
  <text x="90" y="118" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#E0E7FF" text-anchor="middle" font-weight="500">6 skills</text>
  
  <!-- Atlas (Architecture) -->
  <rect x="215" y="55" width="130" height="70" rx="8" fill="#8B5CF6"/>
  <text x="280" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">atlas</text>
  <text x="280" y="98" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Architecture</text>
  <text x="280" y="118" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#EDE9FE" text-anchor="middle" font-weight="500">7 skills</text>
  
  <!-- Forge (Execution) -->
  <rect x="405" y="55" width="130" height="70" rx="8" fill="#F59E0B"/>
  <text x="470" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">forge</text>
  <text x="470" y="98" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Execution</text>
  <text x="470" y="118" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#FEF3C7" text-anchor="middle" font-weight="500">8 skills</text>
  
  <!-- Argus (Monitoring) -->
  <rect x="595" y="55" width="130" height="70" rx="8" fill="#10B981"/>
  <text x="660" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">argus</text>
  <text x="660" y="98" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Monitoring</text>
  <text x="660" y="118" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#D1FAE5" text-anchor="middle" font-weight="500">8 skills</text>
  
  <!-- Muse (Knowledge) -->
  <rect x="785" y="55" width="130" height="70" rx="8" fill="#EC4899"/>
  <text x="850" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">muse</text>
  <text x="850" y="98" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Knowledge</text>
  <text x="850" y="118" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#FBCFE8" text-anchor="middle" font-weight="500">3 skills</text>
</svg>
