<svg viewBox="0 0 900 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="450" fill="#FFFFFF"/>
  
  <!-- Layer 1: PLUGINS (Top) -->
  <g>
    <!-- Main container -->
    <rect x="40" y="30" width="680" height="100" rx="12" fill="#1E293B"/>
    
    <!-- Layer label -->
    <text x="60" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">PLUGINS</text>
    <text x="60" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#CBD5E1">Installable packages</text>
    
    <!-- Plugin pills -->
    <g>
      <!-- oracle -->
      <rect x="260" y="48" width="75" height="32" rx="6" fill="#334155"/>
      <text x="297.5" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle">oracle</text>
      
      <!-- forge -->
      <rect x="360" y="48" width="75" height="32" rx="6" fill="#334155"/>
      <text x="397.5" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle">forge</text>
      
      <!-- muse -->
      <rect x="460" y="48" width="75" height="32" rx="6" fill="#334155"/>
      <text x="497.5" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle">muse</text>
    </g>
    
    <!-- Right annotation -->
    <text x="750" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#334155">Install once,</text>
    <text x="750" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#334155">get everything</text>
  </g>
  
  <!-- Arrow 1: Plugins to Commands -->
  <g>
    <defs>
      <marker id="arrowhead1" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
        <polygon points="0 0, 10 5, 0 10" fill="#94A3B8"/>
      </marker>
    </defs>
    <line x1="380" y1="130" x2="380" y2="160" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead1)"/>
    <text x="395" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">contains</text>
  </g>
  
  <!-- Layer 2: COMMANDS (Middle) -->
  <g>
    <!-- Main container -->
    <rect x="40" y="160" width="680" height="100" rx="12" fill="#6366F1"/>
    
    <!-- Layer label -->
    <text x="60" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">COMMANDS</text>
    <text x="60" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#E0E7FF">Chained workflows</text>
    
    <!-- Command pills -->
    <g>
      <!-- /discover -->
      <rect x="260" y="178" width="75" height="32" rx="6" fill="#4F46E5"/>
      <text x="297.5" y="198" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle">/discover</text>
      
      <!-- /write-prd -->
      <rect x="360" y="178" width="75" height="32" rx="6" fill="#4F46E5"/>
      <text x="397.5" y="198" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle">/write-prd</text>
      
      <!-- /health-check -->
      <rect x="460" y="178" width="85" height="32" rx="6" fill="#4F46E5"/>
      <text x="502.5" y="198" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle">/health-check</text>
    </g>
    
    <!-- Right annotation -->
    <text x="750" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#4F46E5">Type a slash,</text>
    <text x="750" y="198" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#4F46E5">trigger a workflow</text>
  </g>
  
  <!-- Arrow 2: Commands to Skills -->
  <g>
    <defs>
      <marker id="arrowhead2" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
        <polygon points="0 0, 10 5, 0 10" fill="#94A3B8"/>
      </marker>
    </defs>
    <line x1="380" y1="260" x2="380" y2="290" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowhead2)"/>
    <text x="395" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">contains</text>
  </g>
  
  <!-- Layer 3: SKILLS (Bottom) -->
  <g>
    <!-- Main container -->
    <rect x="40" y="290" width="680" height="100" rx="12" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
    
    <!-- Layer label -->
    <text x="60" y="325" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#1E293B">SKILLS</text>
    <text x="60" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748B">32 building blocks with domain knowledge</text>
    
    <!-- Skill pills -->
    <g>
      <!-- cost-sim -->
      <rect x="260" y="308" width="75" height="32" rx="6" fill="#CBD5E1"/>
      <text x="297.5" y="328" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#1E293B" text-anchor="middle">cost-sim</text>
      
      <!-- prd -->
      <rect x="360" y="308" width="75" height="32" rx="6" fill="#CBD5E1"/>
      <text x="397.5" y="328" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#1E293B" text-anchor="middle">prd</text>
      
      <!-- pm-framework -->
      <rect x="460" y="308" width="85" height="32" rx="6" fill="#CBD5E1"/>
      <text x="502.5" y="328" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#1E293B" text-anchor="middle">pm-framework</text>
    </g>
    
    <!-- Right annotation -->
    <text x="750" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#475569">Domain knowledge</text>
    <text x="750" y="328" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#475569">loads automatically</text>
  </g>
</svg>
